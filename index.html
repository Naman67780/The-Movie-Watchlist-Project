<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Explorer</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="./script.js" defer></script>
</head>
<body>
    <div id="tabbar">
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Search movies...">
            <div id="searchDropdown" class="search-dropdown"></div>
        </div>
        <button id="searchBtn">Search</button>

        <select id="genreFilter" class="custom-select">
            <option value="">All Genres</option>
            <option value="28">Action</option>
            <option value="12">Adventure</option>
            <option value="16">Animation</option>
            <option value="35">Comedy</option>
            <option value="80">Crime</option>
            <option value="99">Documentary</option>
            <option value="18">Drama</option>
            <option value="10751">Family</option>
            <option value="14">Fantasy</option>
            <option value="36">History</option>
            <option value="27">Horror</option>
            <option value="10402">Music</option>
            <option value="9648">Mystery</option>
            <option value="10749">Romance</option>
            <option value="878">Science Fiction</option>
            <option value="53">Thriller</option>
            <option value="10752">War</option>
            <option value="37">Western</option>
        </select>

        <select id="sortSelect" class="custom-select">
            <option value="">Sort By</option>
            <option value="rating">Rating (High → Low)</option>
            <option value="title">Title (A → Z)</option>
            <option value="date">Release Date (Newest)</option>
        </select>
    </div>

    <div id="activeFilterBadge"></div>
    <div class="movie-container" id="movies"></div>
    <div id="watchlistSidebar">
        <div class="sidebar-header">
            <button id="closeSidebar" class="back-arrow" title="Close">←</button>
            <h2>🎬 My Watchlist</h2>
        </div>
        <div id="watchlistItems"></div>
        <button id="clearWatchlist">Clear All</button>
    </div>

    <button id="toggleWatchlist">❤️</button>
</body>
</html>
